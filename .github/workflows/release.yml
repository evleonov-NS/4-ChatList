name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build portable exe and installer
        shell: pwsh
        run: ./build.ps1

      - name: Prepare release artifacts
        shell: pwsh
        run: ./scripts/prepare-release.ps1

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $v = python -c "from version import __version__; print(__version__)"
          echo "value=$v" >> $env:GITHUB_OUTPUT

      - name: Verify tag matches version.py
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $version = python -c "from version import __version__; print(__version__)"
          if ($tag -ne $version) {
            throw "Тег ${{ github.ref_name }} не совпадает с version.py ($version)"
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ChatList ${{ steps.version.outputs.value }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
